services:
  #########################################################
  #        GLYCAM-Web Delegator Service                   #
  #########################################################
  delegator:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    hostname: ${CONTAINER_NAME}
    container_name: ${CONTAINER_NAME}
    user: ${IMG_USER_NAME}:${IMG_GROUP_NAME}
    env_file:
      - ${DELEGATOR_ENV_FILE}
    volumes:
      - ./deps/:/programs/
      - ./mounts/containerUser/:/home/${IMG_USER_NAME}/
      - ./mounts/installers/:/installers/
      - ./mounts/sysetc/:/sysetc/
      - ./mounts/sysbin/:/sysbin/
      - ${INPUTS_PATH}:/inputs/
      - ${WORK_PATH}:/work/
      - ${TESTS_PATH}:/tests/
      - ${OUTPUTS_PATH}:/outputs/
    command: bash -c "${COMPILER_COMMAND}"
    networks: 
      this-network:


networks:
  this-network:
    name: ${CONTAINER_NAME}-network



