
#########################################################
#           GLYCAM-Web Delegator Stack                  #
#########################################################
services:
  #########################################################
  #         GLYCAM-Web Delegator Service                  #
  #########################################################
  delegator:
    image: ${DELEGATOR_IMAGE}:${DELEGATOR_TAG}
    hostname: ${CONTAINER_NAME}
    container_name: ${CONTAINER_NAME}
    user: glycam:glycam
    dns:  8.8.8.8
    env_file:
      - ${DELEGATOR_ENV_FILE}
    volumes:
      - ${GEMS_BASE_PATH}:/programs/gems/
      - ${USERDATA_BASE_PATH}:/userdata/
    command: [ "bash", "/print_usage.bash" ]


